# Fleet definition. Add a machine by adding an entry here — the Vagrantfile
# iterates over this list, so no Ruby edits are needed to scale the fleet.
#
# `box` is the name you registered the Packer-built box under (see scripts/build.sh),
# or any public box for quick starts.
defaults:
  cpus: 2
  memory: 2048
  # How the ansible/ tree is shared into the guest. "virtualbox" (vboxsf) needs
  # Guest Additions; "rsync" needs nothing. Per-machine override below.
  synced_folder_type: rsync

# Per-machine keys (all optional):
#   box_version         pin a published version (see boxes/<os>/metadata.json);
#                       omit to always use the latest.
#   cpus / memory       override the defaults above.
#   synced_folder_type  "virtualbox" (native vboxsf, needs Guest Additions) or
#                       "rsync" (no GA required).
#   gui                 true → show the VM window with extra video memory
#                       (pair with a desktop role for a usable GUI).
#   extra_vars          a map merged into the runtime Ansible run, so ONE machine
#                       can opt into extra roles without affecting the others,
#                       e.g. { devfleet_install_desktop: true }.
#
# Example — a GUI desktop machine reusing the Ubuntu box (uncomment + add a
# `desktop` role gated on devfleet_install_desktop to make it do anything):
#   - name: ubuntu-desktop
#     box: devfleet/ubuntu-2404
#     ssh_port: 2226
#     memory: 4096
#     synced_folder_type: virtualbox
#     gui: true
#     extra_vars:
#       devfleet_install_desktop: true
machines:
  - name: ubuntu
    box: devfleet/ubuntu-2404
    ssh_port: 2222
    synced_folder_type: virtualbox   # GA builds cleanly on Ubuntu 24.04
  - name: debian
    box: devfleet/debian-12
    ssh_port: 2223
    synced_folder_type: virtualbox   # GA builds cleanly on Debian 12
  - name: rocky
    box: devfleet/rocky-9
    ssh_port: 2224
    memory: 3072
    # GA doesn't compile on Rocky 9.8 (VBox 7.1 GA vs kernel) → stay on rsync.
    synced_folder_type: rsync

  # An EPICS developer VM: reuses the Ubuntu box + builds EPICS Base and the core
  # support modules from source into /opt/epics (flag-file cached). Extra CPU/RAM
  # for compiling. Enable/disable modules by editing extra_vars.
  - name: epics
    box: devfleet/ubuntu-2404
    ssh_port: 2225
    memory: 8192          # EPICS source compiles (esp. PVXS) are memory-hungry
    cpus: 4
    gui: true             # expose a display (libvirt SPICE / VirtualBox window)
    synced_folder_type: virtualbox   # forced to rsync automatically on libvirt
    extra_vars:
      devfleet_install_desktop: true # XFCE desktop + autologin
      # EPICS base + core modules
      m_base: true
      m_asyn: true
      m_autosave: true
      m_sscan: true
      m_calc: true
      m_seq: true
      m_stream: true
      # extra Ubuntu-safe modules
      m_p4p: true
      m_opcua: true
      # GUI EPICS control-system tool (pulls in java; needs the desktop)
      phoebus: true
