# Default inventory for ad-hoc/local runs against Vagrant machines.
# Vagrant's ansible provisioner generates its own inventory automatically;
# this file is for running the playbook by hand, e.g.:
#   cd ansible && ansible-playbook playbooks/base.yml -l ubuntu
#
# Ports match the Vagrant SSH forwards in vagrant/machines.yaml.
[devfleet]
ubuntu  ansible_host=127.0.0.1 ansible_port=2222 ansible_user=vagrant
debian  ansible_host=127.0.0.1 ansible_port=2223 ansible_user=vagrant
rocky   ansible_host=127.0.0.1 ansible_port=2224 ansible_user=vagrant

[devfleet:vars]
ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
