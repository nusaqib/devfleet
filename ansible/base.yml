---
# The one playbook run at BOTH image-build time (Packer) and run time (Vagrant).
# `devfleet_context` is "image" during Packer builds, "runtime" from Vagrant —
# use it in roles to skip/branch on build-only vs boot-time steps.
- name: Base provisioning for all devfleet machines
  hosts: all
  become: true
  # proxy_env is applied to every task's environment (empty = no proxy). Override
  # per-machine via machines.yaml extra_vars if you're behind a corporate proxy.
  environment: "{{ proxy_env | default({}) }}"
  vars:
    # NOTE: don't declare `devfleet_context` here as "{{ devfleet_context |
    # default('runtime') }}" — that self-reference is a recursion error on newer
    # Ansible. Packer/Vagrant pass it as an extra-var; use sites default it.
    # Facts the vendored EPICS roles expect (from the upstream training-vm repo).
    is_debian: "{{ ansible_facts['os_family'] == 'Debian' }}"
    is_redhat: "{{ ansible_facts['os_family'] == 'RedHat' }}"
    # The unprivileged dev account (used by e.g. the bluesky role). devfleet uses
    # the vagrant user; override per machine if you want a separate account.
    dev_user: "vagrant"
    # We provision real VMs, not containers (some vendored roles branch on this
    # to decide whether they can manage systemd services).
    in_container: false
  pre_tasks:
    # Load OS-specific paths (the `distro.*` dict) the vendored EPICS roles use.
    - name: Load OS-specific variables
      ansible.builtin.include_vars: "{{ item }}"
      with_first_found:
        - files:
            - "{{ ansible_facts['distribution'] }}.yml"
            - "{{ ansible_facts['os_family'] }}.yml"
            - "default.yml"
          paths:
            - "{{ playbook_dir }}/vars/os"
      tags: always
  roles:
    - base
    # Dev tooling — set devfleet_install_devtools=false for a minimal box.
    - role: devtools
      when: devfleet_install_devtools | default(true) | bool
    # Lightweight XFCE desktop (pair with `gui: true` in machines.yaml).
    - role: desktop
      when: devfleet_install_desktop | default(false) | bool

    # --- Support roles for the EPICS high-level tools ---------------------------
    - role: java                     # Temurin JDK 21 (needed by phoebus/archiver)
      when: java | default(false) | bool
    # NOTE: the vendored `docker` role installs docker-ce, which conflicts with
    # the docker.io the devtools role already installs. devtools provides docker
    # (+ compose), and `docker` is a COMMAND var ("docker"/"podman") from vars/os/,
    # so we don't wire the standalone docker role here.
    - role: catrust                  # corporate CA trust (off unless behind DPI proxy)
      when: catrust | default(false) | bool

    # --- EPICS ecosystem (opt-in per machine via machines.yaml extra_vars) ------
    # Roles vendored from the EPICS training-vm project. Each is off by default and
    # enabled with its flag, e.g. extra_vars: { m_base: true, m_asyn: true }.
    # Modules depend on m_base (meta), so enabling a module pulls Base in; the
    # build is source-compiled once and flag-file cached under /opt/epics/.flag.
    # Order respects the dependency chain (sscan<-calc; asyn+calc<-stream;
    # base+asyn+autosave+pvaPy<-areadetector).
    - role: m_base
      when: m_base | default(false) | bool
    - role: m_asyn
      when: m_asyn | default(false) | bool
    - role: m_autosave
      when: m_autosave | default(false) | bool
    - role: m_sscan
      when: m_sscan | default(false) | bool
    - role: m_calc
      when: m_calc | default(false) | bool
    - role: m_seq
      when: m_seq | default(false) | bool
    - role: m_stream
      when: m_stream | default(false) | bool
    # Additional modules. NOTE: m_pvaPy (and thus m_areadetector, which depends on
    # it) do NOT build on Ubuntu — use them on Rocky. m_opcua/m_p4p are Ubuntu-safe.
    - role: m_p4p
      when: m_p4p | default(false) | bool
    - role: m_opcua
      when: m_opcua | default(false) | bool
    - role: m_pvaPy
      when: m_pvaPy | default(false) | bool
    - role: m_areadetector
      when: m_areadetector | default(false) | bool

    # --- EPICS high-level tools (heavier; opt-in) -------------------------------
    - role: oac_tree
      when: oac_tree | default(false) | bool
    - role: phoebus                  # CS-Studio Phoebus GUI (maven build; needs a desktop)
      when: phoebus | default(false) | bool
    # bluesky runs as the unprivileged dev_user (its container compose stack
    # bind-mounts paths under that user's $HOME; running as root breaks them).
    # Its own firewall tasks override become_user back to root.
    - role: bluesky                  # Bluesky data-acquisition (docker compose stack)
      become: true
      become_user: "{{ dev_user }}"
      when: bluesky | default(false) | bool
    - role: archiver_appliance       # EPICS Archiver Appliance (java + mysql + tomcat)
      when: archiver_appliance | default(false) | bool
