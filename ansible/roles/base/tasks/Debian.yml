---
# Debian/Ubuntu-specific setup.
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install build tools (Debian family)
  ansible.builtin.apt:
    name:
      - build-essential
    state: present
  when: base_install_build_tools | bool

# NOTE: provider-portable networking (match-any-ethernet netplan) is handled by
# packer/scripts/network-portable.sh at image-build time — a shell step lands in
# the image reliably, whereas Ansible file-copy over Packer's SSH proxy did not.
