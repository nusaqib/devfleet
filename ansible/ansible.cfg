[defaults]
roles_path = ./roles
inventory = ./inventory/local.ini
host_key_checking = False
retry_files_enabled = False
# Pretty YAML-style output via the BUILT-IN default callback. (The standalone
# community.general.yaml callback was removed in community.general 12.0.0, so
# don't depend on it — it breaks on hosts with a newer collection installed.)
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
