name: lint

# Validate every layer on push/PR. No VMs are booted (CI has no nested virt),
# so this only exercises the static checks: packer validate, ansible
# syntax-check + ansible-lint, and vagrant validate (Vagrantfile parse).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packer:
    name: packer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@v3
      - name: fmt check
        run: packer fmt -check -recursive packer
      - name: init
        run: packer init packer
      - name: validate each OS
        run: |
          for vf in packer/*.pkrvars.hcl; do
            echo "::group::validate $vf"
            packer validate -var-file="$vf" packer
            echo "::endgroup::"
          done

  ansible:
    name: ansible lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install ansible tooling
        run: pip install ansible ansible-lint
      - name: install collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: syntax check
        working-directory: ansible
        run: ansible-playbook playbooks/base.yml --syntax-check
      - name: ansible-lint
        working-directory: ansible
        run: ansible-lint

  vagrant:
    name: vagrant validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install vagrant
        run: |
          wget -qO- https://apt.releases.hashicorp.com/gpg | \
            sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y vagrant
      - name: validate Vagrantfile
        working-directory: vagrant
        run: vagrant validate
