name: lint

# Validate every layer on push/PR. No VMs are booted (CI has no nested virt),
# so this is a static gate: packer fmt + validate (per OS), ansible
# syntax-check + ansible-lint, and a Vagrantfile/machines.yaml sanity check.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packer-fmt:
    name: packer fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@v3
      - name: fmt check
        run: packer fmt -check -recursive packer

  packer-validate:
    name: packer validate (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-2404, debian-12, rocky-9]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@v3
      - name: init
        run: packer init packer
      - name: validate ${{ matrix.os }}
        run: packer validate -var-file="packer/${{ matrix.os }}.pkrvars.hcl" packer

  ansible:
    name: ansible lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install ansible tooling
        run: pip install ansible ansible-lint
      - name: install collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: syntax check
        working-directory: ansible
        run: ansible-playbook base.yml --syntax-check
      - name: ansible-lint
        working-directory: ansible
        run: ansible-lint

  vagrant:
    name: vagrant lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `vagrant validate` needs a real provider (VirtualBox), which CI runners
      # don't have — so we do a provider-independent check instead: Ruby syntax
      # of the Vagrantfile + YAML validity of machines.yaml. Full `vagrant
      # validate` runs locally via `make lint` on a host with VirtualBox.
      - name: Vagrantfile ruby syntax
        run: ruby -c vagrant/Vagrantfile
      - name: machines.yaml is valid YAML
        run: ruby -ryaml -e "YAML.load_file('vagrant/machines.yaml'); puts 'machines.yaml OK'"
