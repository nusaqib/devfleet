# Debian 12 preseed — fully automated install.
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string devfleet
d-i netcfg/get_domain string local

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Root disabled; create the vagrant user.
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Vagrant
d-i passwd/username string vagrant
d-i passwd/user-password password vagrant
d-i passwd/user-password-again password vagrant
d-i user-setup/allow-password-weak boolean true

# Partitioning — single disk, guided, all in one partition.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Don't prompt to scan extra installation media (CD/DVD); use network mirror.
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false
d-i apt-setup/disable-cdrom-entries boolean true

# Base + packages
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server sudo python3 curl
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# GRUB
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Finish
d-i finish-install/reboot_in_progress note

# Passwordless sudo + Vagrant insecure key.
d-i preseed/late_command string \
  in-target sh -c 'echo "vagrant ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/vagrant'; \
  in-target chmod 440 /etc/sudoers.d/vagrant; \
  in-target mkdir -p /home/vagrant/.ssh; \
  in-target sh -c 'curl -fsSL https://raw.githubusercontent.com/hashicorp/vagrant/main/keys/vagrant.pub -o /home/vagrant/.ssh/authorized_keys'; \
  in-target chown -R vagrant:vagrant /home/vagrant/.ssh; \
  in-target chmod 700 /home/vagrant/.ssh; \
  in-target chmod 600 /home/vagrant/.ssh/authorized_keys
