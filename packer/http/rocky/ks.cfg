# Rocky Linux 9 kickstart — automated install.
text
lang en_US.UTF-8
keyboard us
timezone UTC --utc
network --bootproto=dhcp --hostname=devfleet

# Root disabled; create the vagrant user with a known password.
rootpw --lock
user --name=vagrant --password=vagrant --plaintext --groups=wheel

# Use the online BaseOS/AppStream repos (boot ISO has no packages).
url --url="https://download.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/"
repo --name=AppStream --baseurl="https://download.rockylinux.org/pub/rocky/9/AppStream/x86_64/os/"

# Disk: wipe and use the whole thing.
zerombr
clearpart --all --initlabel
autopart --type=plain
bootloader --location=mbr

firewall --disabled
selinux --enforcing

# Minimal package set + what we need for SSH/Ansible.
%packages
@^minimal-environment
openssh-server
sudo
python3
curl
%end

reboot

%post --log=/root/ks-post.log
# Passwordless sudo for the wheel group's vagrant user.
echo "vagrant ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/vagrant
chmod 440 /etc/sudoers.d/vagrant

# Install the Vagrant insecure public key.
mkdir -p /home/vagrant/.ssh
curl -fsSL https://raw.githubusercontent.com/hashicorp/vagrant/main/keys/vagrant.pub \
  -o /home/vagrant/.ssh/authorized_keys
chown -R vagrant:vagrant /home/vagrant/.ssh
chmod 700 /home/vagrant/.ssh
chmod 600 /home/vagrant/.ssh/authorized_keys
%end
